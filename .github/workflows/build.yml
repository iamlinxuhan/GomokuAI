name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ============================================================
  #  Windows CUDA 版 (NVIDIA显卡) — .exe 安装程序 (NSIS)
  # ============================================================
  build-windows-cuda:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install dependencies (CUDA)
        run: |
          python -m pip install --upgrade pip
          pip install numpy PyQt5
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124
          pip install pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --icon="五子棋.ico" --name "GomokuAI_CUDA" main.py

      - name: Create NSIS installer
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          $outName = "GomokuAI_For_Windows(CUDA)_v${ver}_Setup.exe"

          @" | Out-File -Encoding ASCII installer.nsi
          !include "MUI2.nsh"

          Name "五子棋AI (CUDA)"
          OutFile "${outName}"
          InstallDir "`$PROGRAMFILES\GomokuAI_CUDA"
          RequestExecutionLevel admin
          !define MUI_ABORTWARNING
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "SimpChinese"
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath `$INSTDIR
            File /r "dist\GomokuAI_CUDA\*"
            CreateShortCut "`$DESKTOP\五子棋AI (CUDA).lnk" "`$INSTDIR\GomokuAI_CUDA.exe" "" "`$INSTDIR\GomokuAI_CUDA.exe" 0
            CreateDirectory "`$SMPROGRAMS\五子棋AI (CUDA)"
            CreateShortCut "`$SMPROGRAMS\五子棋AI (CUDA)\五子棋AI (CUDA).lnk" "`$INSTDIR\GomokuAI_CUDA.exe" "" "`$INSTDIR\GomokuAI_CUDA.exe" 0
            CreateShortCut "`$SMPROGRAMS\五子棋AI (CUDA)\卸载 五子棋AI (CUDA).lnk" "`$INSTDIR\uninstall.exe"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "`$DESKTOP\五子棋AI (CUDA).lnk"
            RMDir /r "`$SMPROGRAMS\五子棋AI (CUDA)"
            RMDir /r "`$INSTDIR"
          SectionEnd
          "@

          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
          ls -lh "${outName}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GomokuAI_For_Windows(CUDA)
          path: GomokuAI_For_Windows(CUDA)_v*_Setup.exe


  # ============================================================
  #  Windows CPU 版 (无NVIDIA显卡) — .exe 安装程序 (NSIS)
  # ============================================================
  build-windows-cpu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install numpy PyQt5
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --icon="五子棋.ico" --name "GomokuAI_CPU" main.py

      - name: Create NSIS installer
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          $outName = "GomokuAI_For_Windows(CPU)_v${ver}_Setup.exe"

          @" | Out-File -Encoding ASCII installer.nsi
          !include "MUI2.nsh"

          Name "五子棋AI (CPU)"
          OutFile "${outName}"
          InstallDir "`$PROGRAMFILES\GomokuAI_CPU"
          RequestExecutionLevel admin
          !define MUI_ABORTWARNING
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "SimpChinese"
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath `$INSTDIR
            File /r "dist\GomokuAI_CPU\*"
            CreateShortCut "`$DESKTOP\五子棋AI (CPU).lnk" "`$INSTDIR\GomokuAI_CPU.exe" "" "`$INSTDIR\GomokuAI_CPU.exe" 0
            CreateDirectory "`$SMPROGRAMS\五子棋AI (CPU)"
            CreateShortCut "`$SMPROGRAMS\五子棋AI (CPU)\五子棋AI (CPU).lnk" "`$INSTDIR\GomokuAI_CPU.exe" "" "`$INSTDIR\GomokuAI_CPU.exe" 0
            CreateShortCut "`$SMPROGRAMS\五子棋AI (CPU)\卸载 五子棋AI (CPU).lnk" "`$INSTDIR\uninstall.exe"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "`$DESKTOP\五子棋AI (CPU).lnk"
            RMDir /r "`$SMPROGRAMS\五子棋AI (CPU)"
            RMDir /r "`$INSTDIR"
          SectionEnd
          "@

          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
          ls -lh "${outName}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GomokuAI_For_Windows(CPU)
          path: GomokuAI_For_Windows(CPU)_v*_Setup.exe


  # ============================================================
  #  Linux AMD64 CUDA .deb (NVIDIA显卡) — --onedir → /opt/
  # ============================================================
  build-linux-cuda-amd:
    runs-on: ubuntu-latest
    container:
      image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            binutils libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 \
            libegl1 libfontconfig1 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy PyQt5 pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --name "gomoku-ai-cuda" main.py

      - name: Package .deb
        run: |
          raw="${GITHUB_REF_NAME}"
          if [[ "$raw" =~ ^v[0-9] ]]; then VERSION="${raw#v}"
          elif [[ "$raw" =~ ^[0-9] ]]; then VERSION="$raw"
          else VERSION="0.0.0-$(date -u +%Y%m%d-%H%M%S)"; fi
          echo "VERSION=$VERSION"

          PKG_DIR="deb_build"
          APP_DIR="${PKG_DIR}/opt/gomoku-ai-cuda"
          BIN_DIR="${PKG_DIR}/usr/local/bin"
          DESK_DIR="${PKG_DIR}/usr/share/applications"
          mkdir -p "${APP_DIR}" "${BIN_DIR}" "${DESK_DIR}" "${PKG_DIR}/DEBIAN"

          # 复制整个 onedir 到 /opt/
          cp -r dist/gomoku-ai-cuda/* "${APP_DIR}/"
          chmod -R 755 "${APP_DIR}"

          # 创建启动脚本
          cat > "${BIN_DIR}/gomoku-ai-cuda" << 'LAUNCHER'
#!/bin/bash
exec /opt/gomoku-ai-cuda/gomoku-ai-cuda "$@"
LAUNCHER
          chmod 755 "${BIN_DIR}/gomoku-ai-cuda"

          cat > "${DESK_DIR}/gomoku-ai-cuda.desktop" << 'DESKTOP_EOF'
[Desktop Entry]
Name=五子棋AI (CUDA)
Name[zh_CN]=五子棋AI (CUDA)
Comment=Gomoku AI - PVS+LMR+MultiLine Defense+Desperation Mode
Exec=/usr/local/bin/gomoku-ai-cuda
Terminal=false
Type=Application
Categories=Game;BoardGame;
DESKTOP_EOF

          cat > "${PKG_DIR}/DEBIAN/control" << CONTROL_EOF
Package: gomoku-ai-cuda
Version: ${VERSION}
Section: games
Priority: optional
Architecture: amd64
Maintainer: iamlinxuhan
Depends: libc6 (>= 2.28), libgl1, libglib2.0-0, libxkbcommon0
Description: 五子棋AI CUDA版 - PVS+LMR+多线防守+拼命模式+GPU加速
CONTROL_EOF

          dpkg-deb --build "${PKG_DIR}" "GomokuAI_For_Linux(CUDA)_AMD.deb"
          ls -lh "GomokuAI_For_Linux(CUDA)_AMD.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GomokuAI_For_Linux(CUDA)_AMD
          path: GomokuAI_For_Linux(CUDA)_AMD.deb


  # ============================================================
  #  Linux AMD64 CPU .deb (无NVIDIA显卡) — --onedir → /opt/
  # ============================================================
  build-linux-cpu-amd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            binutils libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 \
            libegl1 libfontconfig1 libdbus-1-3

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install numpy PyQt5
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --name "gomoku-ai-cpu" main.py

      - name: Package .deb
        run: |
          raw="${GITHUB_REF_NAME}"
          if [[ "$raw" =~ ^v[0-9] ]]; then VERSION="${raw#v}"
          elif [[ "$raw" =~ ^[0-9] ]]; then VERSION="$raw"
          else VERSION="0.0.0-$(date -u +%Y%m%d-%H%M%S)"; fi
          echo "VERSION=$VERSION"

          PKG_DIR="deb_build"
          APP_DIR="${PKG_DIR}/opt/gomoku-ai-cpu"
          BIN_DIR="${PKG_DIR}/usr/local/bin"
          DESK_DIR="${PKG_DIR}/usr/share/applications"
          mkdir -p "${APP_DIR}" "${BIN_DIR}" "${DESK_DIR}" "${PKG_DIR}/DEBIAN"

          cp -r dist/gomoku-ai-cpu/* "${APP_DIR}/"
          chmod -R 755 "${APP_DIR}"

          cat > "${BIN_DIR}/gomoku-ai-cpu" << 'LAUNCHER'
#!/bin/bash
exec /opt/gomoku-ai-cpu/gomoku-ai-cpu "$@"
LAUNCHER
          chmod 755 "${BIN_DIR}/gomoku-ai-cpu"

          cat > "${DESK_DIR}/gomoku-ai-cpu.desktop" << 'DESKTOP_EOF'
[Desktop Entry]
Name=五子棋AI (CPU)
Name[zh_CN]=五子棋AI (CPU)
Comment=Gomoku AI - PVS+LMR+MultiLine Defense+Desperation Mode
Exec=/usr/local/bin/gomoku-ai-cpu
Terminal=false
Type=Application
Categories=Game;BoardGame;
DESKTOP_EOF

          cat > "${PKG_DIR}/DEBIAN/control" << CONTROL_EOF
Package: gomoku-ai-cpu
Version: ${VERSION}
Section: games
Priority: optional
Architecture: amd64
Maintainer: iamlinxuhan
Depends: libc6 (>= 2.28), libgl1, libglib2.0-0, libxkbcommon0
Description: 五子棋AI CPU版 - PVS+LMR+多线防守+拼命模式(不需要NVIDIA显卡)
CONTROL_EOF

          dpkg-deb --build "${PKG_DIR}" "GomokuAI_For_Linux(CPU)_AMD.deb"
          ls -lh "GomokuAI_For_Linux(CPU)_AMD.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GomokuAI_For_Linux(CPU)_AMD
          path: GomokuAI_For_Linux(CPU)_AMD.deb


  # ============================================================
  #  Linux ARM64 CUDA .pkg (Jetson / ARM服务器)
  #  GitHub ARM runner 无 GPU，实际使用 CPU PyTorch
  #  --onedir → 整体打包目录
  # ============================================================
  build-linux-cuda-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            binutils libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 \
            libegl1 libfontconfig1 libdbus-1-3 \
            qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (CPU PyTorch for ARM)
        run: |
          python -m pip install --upgrade pip
          pip install "sip<7" "PyQt5-sip<13"
          pip install numpy PyQt5
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --name "gomoku-ai-cuda-arm" main.py

      - name: Package .pkg (tar.gz)
        run: |
          PKG_NAME="GomokuAI_For_Linux(CUDA)_ARM"
          PKG_DIR="${PKG_NAME}/gomoku-ai-cuda-arm"
          mkdir -p "${PKG_DIR}"

          # 复制整个 onedir
          cp -r dist/gomoku-ai-cuda-arm/* "${PKG_DIR}/"
          chmod -R 755 "${PKG_DIR}"

          cat > "${PKG_NAME}/install.sh" << 'INSTALL_EOF'
#!/bin/bash
# 五子棋AI ARM64 CUDA 版安装脚本
set -e
APP_DIR="/opt/gomoku-ai-cuda-arm"
echo "Installing GomokuAI (CUDA ARM)..."
sudo mkdir -p "${APP_DIR}"
sudo cp -r gomoku-ai-cuda-arm/* "${APP_DIR}/"
sudo chmod -R 755 "${APP_DIR}"
sudo ln -sf "${APP_DIR}/gomoku-ai-cuda-arm" /usr/local/bin/gomoku-ai
echo "Done! Run: gomoku-ai"
INSTALL_EOF
          chmod 755 "${PKG_NAME}/install.sh"

          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          mv "${PKG_NAME}.tar.gz" "${PKG_NAME}.pkg"
          ls -lh "${PKG_NAME}.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GomokuAI_For_Linux(CUDA)_ARM
          path: GomokuAI_For_Linux(CUDA)_ARM.pkg


  # ============================================================
  #  Linux ARM64 CPU .pkg (树莓派5 / ARM SBC) — --onedir
  # ============================================================
  build-linux-cpu-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            binutils libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 \
            libegl1 libfontconfig1 libdbus-1-3 \
            qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install "sip<7" "PyQt5-sip<13"
          pip install numpy PyQt5
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --name "gomoku-ai-cpu-arm" main.py

      - name: Package .pkg (tar.gz)
        run: |
          PKG_NAME="GomokuAI_For_Linux(CPU)_ARM"
          PKG_DIR="${PKG_NAME}/gomoku-ai-cpu-arm"
          mkdir -p "${PKG_DIR}"

          cp -r dist/gomoku-ai-cpu-arm/* "${PKG_DIR}/"
          chmod -R 755 "${PKG_DIR}"

          cat > "${PKG_NAME}/install.sh" << 'INSTALL_EOF'
#!/bin/bash
# 五子棋AI ARM64 CPU 版安装脚本
set -e
APP_DIR="/opt/gomoku-ai-cpu-arm"
echo "Installing GomokuAI (CPU ARM)..."
sudo mkdir -p "${APP_DIR}"
sudo cp -r gomoku-ai-cpu-arm/* "${APP_DIR}/"
sudo chmod -R 755 "${APP_DIR}"
sudo ln -sf "${APP_DIR}/gomoku-ai-cpu-arm" /usr/local/bin/gomoku-ai
echo "Done! Run: gomoku-ai"
INSTALL_EOF
          chmod 755 "${PKG_NAME}/install.sh"

          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          mv "${PKG_NAME}.tar.gz" "${PKG_NAME}.pkg"
          ls -lh "${PKG_NAME}.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GomokuAI_For_Linux(CPU)_ARM
          path: GomokuAI_For_Linux(CPU)_ARM.pkg


  # ============================================================
  #  GitHub Release (仅 tag 推送时触发)
  # ============================================================
  release:
    needs:
      - build-windows-cuda
      - build-windows-cpu
      - build-linux-cuda-amd
      - build-linux-cpu-amd
      - build-linux-cuda-arm
      - build-linux-cpu-arm
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: List release files
        run: ls -lah release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ github.ref_name }}"
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
