name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ============================================================
  #  Windows 统一版 — 7z SFX 自解压安装程序
  #  同时打包 PyTorch CUDA + Intel XPU，运行时自动检测 GPU 类型
  # ============================================================
  build-windows-unified:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        shell: pwsh
        run: |
          Get-PSDrive C | Select-Object Used,Free
          Remove-Item -Recurse -Force "$env:AGENT_TOOLSDIRECTORY\dotnet","$env:AGENT_TOOLSDIRECTORY\java","$env:AGENT_TOOLSDIRECTORY\go" -ErrorAction SilentlyContinue
          Get-PSDrive C | Select-Object Used,Free

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (CUDA + XPU)
        run: |
          python -m pip install --upgrade pip
          pip install numpy PyQt5
          # CUDA 版 PyTorch (NVIDIA GPU)
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124
          # Intel XPU 扩展 (Intel GPU)
          pip install intel-extension-for-pytorch
          pip install pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --icon="五子棋.ico" --name "GomokuAI" `
            --exclude-module torch.distributed `
            --exclude-module torch.testing `
            --exclude-module torch.jit `
            --exclude-module torch.futures `
            --exclude-module torch._dynamo `
            --exclude-module torch._inductor `
            --collect-submodules torch `
            --collect-submodules intel_extension_for_pytorch `
            main.py

      - name: Create 7z SFX installer
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}' -replace '^v',''
          $outName = "GomokuAI_For_Windows_v${ver}_Setup.exe"
          $appDir = "dist\GomokuAI"

          # ---- setup.ps1 (安装后创建快捷方式) ----
          $setupPs = @'
          $WshShell = New-Object -ComObject WScript.Shell
          $InstallDir = Split-Path -Parent $MyInvocation.MyCommand.Path
          $AppExe = Join-Path $InstallDir 'GomokuAI.exe'
          $Programs = Join-Path $env:APPDATA 'Microsoft\Windows\Start Menu\Programs\五子棋AI'
          New-Item -ItemType Directory -Force -Path $Programs | Out-Null
          $sc = $WshShell.CreateShortcut(([Environment]::GetFolderPath('Desktop') + '\五子棋AI.lnk'))
          $sc.TargetPath = $AppExe; $sc.Save()
          $sc2 = $WshShell.CreateShortcut((Join-Path $Programs '五子棋AI.lnk'))
          $sc2.TargetPath = $AppExe; $sc2.Save()
          $sc3 = $WshShell.CreateShortcut((Join-Path $Programs '卸载 五子棋AI.lnk'))
          $sc3.TargetPath = (Join-Path $InstallDir 'uninstall.cmd'); $sc3.Save()
          Write-Host '五子棋AI 安装完成！(支持NVIDIA CUDA / Intel XPU / CPU自动检测)'
          Start-Sleep -Seconds 2
          '@
          $setupPs | Set-Content -Encoding UTF8 "$appDir\setup.ps1"

          # ---- uninstall.cmd ----
          $uninstCmd = @'
          @echo off
          echo ============================================
          echo   卸载 五子棋AI
          echo ============================================
          echo.
          taskkill /f /im GomokuAI.exe >nul 2>&1
          del /q "%USERPROFILE%\Desktop\五子棋AI.lnk" >nul 2>&1
          rmdir /s /q "%APPDATA%\Microsoft\Windows\Start Menu\Programs\五子棋AI" >nul 2>&1
          echo 快捷方式已删除。
          echo 安装目录: %~dp0
          echo 如需完全删除，请手动删除上述文件夹。
          echo.
          pause
          '@
          $uninstCmd | Set-Content -Encoding ASCII "$appDir\uninstall.cmd"

          # ---- sfx_config.txt ----
          if ($ver -match '^\d') { $displayVer = "v$ver" } else { $displayVer = "$ver" }
          $sfxCfg = @"
          ;!@Install@!UTF-8!
          Title="五子棋AI $displayVer (NVIDIA/Intel/CPU)"
          BeginPrompt="即将安装 五子棋AI $displayVer，是否继续？(支持NVIDIA CUDA / Intel XPU / CPU自动检测)"
          RunProgram="powershell -WindowStyle Hidden -ExecutionPolicy Bypass -File \"%%T\\setup.ps1\""
          Directory="%%LocalAppData%%\\GomokuAI"
          ;!@InstallEnd@!
          "@
          $sfxCfg | Set-Content -Encoding ASCII "sfx_config.txt"

          # ---- 压缩 (7z.sfx 已内置在 7-Zip 安装目录) + 拼接 SFX ----
          & "C:\Program Files\7-Zip\7z.exe" a -mx9 -mfb=273 -md=512m -ms=on "temp.7z" "$appDir\*"
          cmd /c "copy /b `"C:\Program Files\7-Zip\7z.sfx`" + sfx_config.txt + temp.7z `"$outName`""
          Get-ChildItem "$outName" | Select-Object Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GomokuAI_For_Windows
          path: GomokuAI_For_Windows_v*_Setup.exe


  # ============================================================
  #  Linux AMD64 统一 .deb — onedir → /opt/
  #  同时打包 PyTorch CUDA + Intel XPU，运行时自动检测
  # ============================================================
  build-linux-amd:
    runs-on: ubuntu-latest
    container:
      image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android /usr/local/.ghcup 2>/dev/null || true
          apt-get clean 2>/dev/null || true
          df -h /

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            binutils libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 \
            libegl1 libfontconfig1 libdbus-1-3

      - name: Install Python dependencies (CUDA + XPU)
        run: |
          python -m pip install --upgrade pip
          pip install numpy PyQt5
          # Intel XPU 扩展 (Intel GPU 支持)
          pip install intel-extension-for-pytorch
          pip install pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --name "gomoku-ai" \
            --exclude-module torch.distributed \
            --exclude-module torch.testing \
            --exclude-module torch.jit \
            --exclude-module torch.futures \
            --exclude-module torch._dynamo \
            --exclude-module torch._inductor \
            --collect-submodules torch \
            --collect-submodules intel_extension_for_pytorch \
            main.py

      - name: Package .deb
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          if [[ "$raw" =~ ^v[0-9] ]]; then VERSION="${raw#v}"
          elif [[ "$raw" =~ ^[0-9] ]]; then VERSION="$raw"
          else VERSION="0.0.0-$(date -u +%Y%m%d-%H%M%S)"; fi
          echo "VERSION=$VERSION"

          PKG_DIR="deb_build"
          APP_DIR="${PKG_DIR}/opt/gomoku-ai"
          BIN_DIR="${PKG_DIR}/usr/local/bin"
          DESK_DIR="${PKG_DIR}/usr/share/applications"
          mkdir -p "${APP_DIR}" "${BIN_DIR}" "${DESK_DIR}" "${PKG_DIR}/DEBIAN"

          cp -r dist/gomoku-ai/* "${APP_DIR}/"
          chmod -R 755 "${APP_DIR}"

          # 启动脚本
          printf '%s\n%s\n' '#!/bin/bash' 'exec /opt/gomoku-ai/gomoku-ai "$@"' > "${BIN_DIR}/gomoku-ai"
          chmod 755 "${BIN_DIR}/gomoku-ai"

          # .desktop 文件
          printf '%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n' \
            '[Desktop Entry]' \
            'Name=五子棋AI' \
            'Name[zh_CN]=五子棋AI' \
            'Comment=Gomoku AI - PVS+LMR+MultiLine Defense+Desperation Mode (NVIDIA/Intel/CPU)' \
            'Exec=/usr/local/bin/gomoku-ai' \
            'Terminal=false' \
            'Type=Application' \
            'Categories=Game;BoardGame;' \
            > "${DESK_DIR}/gomoku-ai.desktop"

          # DEBIAN/control
          printf '%s\n%s\n%s\n%s\n%s\n%s\n%s\n' \
            "Package: gomoku-ai" \
            "Version: ${VERSION}" \
            "Section: games" \
            "Priority: optional" \
            "Architecture: amd64" \
            "Maintainer: iamlinxuhan" \
            "Depends: libc6 (>= 2.28), libgl1, libglib2.0-0, libxkbcommon0" \
            "Description: 五子棋AI - PVS+LMR+多线防守+拼命模式 (NVIDIA CUDA / Intel XPU / CPU 自动检测)" \
            > "${PKG_DIR}/DEBIAN/control"

          # 打包前再清理一次，确保有足够空间
          df -h /
          pip cache purge 2>/dev/null || true
          rm -rf /tmp/pip-* /tmp/tmp* 2>/dev/null || true
          df -h /

          # 使用 gzip 压缩（比 zstd 省磁盘，兼容性更好）
          dpkg-deb -Zgzip --build "${PKG_DIR}" "GomokuAI_For_Linux_AMD.deb"
          ls -lh "GomokuAI_For_Linux_AMD.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GomokuAI_For_Linux_AMD
          path: GomokuAI_For_Linux_AMD.deb


  # ============================================================
  #  Linux ARM64 统一 .pkg — apt PyQt5 (跳过源码编译)
  # ============================================================
  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (含 apt PyQt5 跳过慢速源码编译)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            python3-venv python3-dev python3-pyqt5 \
            binutils libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 \
            libegl1 libfontconfig1 libdbus-1-3 \
            qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools

      - name: Setup venv & install pip deps
        run: |
          python3 -m venv --system-site-packages .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install numpy
          .venv/bin/pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          .venv/bin/pip install pyinstaller
          .venv/bin/python -c "from PyQt5.QtWidgets import QApplication; print('PyQt5 OK')"

      - name: Build (onedir)
        run: |
          .venv/bin/pyinstaller --onedir --windowed --name "gomoku-ai-arm" \
            --exclude-module torch.distributed \
            --exclude-module torch.testing \
            --exclude-module torch.jit \
            --exclude-module torch.futures \
            --exclude-module torch._dynamo \
            --exclude-module torch._inductor \
            --collect-submodules torch \
            main.py

      - name: Package .pkg
        run: |
          PKG_NAME="GomokuAI_For_Linux_ARM"
          PKG_DIR="${PKG_NAME}/gomoku-ai-arm"
          mkdir -p "${PKG_DIR}"
          cp -r dist/gomoku-ai-arm/* "${PKG_DIR}/"
          chmod -R 755 "${PKG_DIR}"
          printf '%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n' \
            '#!/bin/bash' \
            '# 五子棋AI ARM64 版安装脚本' \
            'set -e' \
            'APP_DIR="/opt/gomoku-ai-arm"' \
            'echo "Installing GomokuAI (ARM)..."' \
            'sudo mkdir -p "${APP_DIR}"' \
            'sudo cp -r gomoku-ai-arm/* "${APP_DIR}/"' \
            'sudo chmod -R 755 "${APP_DIR}"' \
            'sudo ln -sf "${APP_DIR}/gomoku-ai-arm" /usr/local/bin/gomoku-ai' \
            'echo "Done! Run: gomoku-ai"' \
            > "${PKG_NAME}/install.sh"
          chmod 755 "${PKG_NAME}/install.sh"
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          mv "${PKG_NAME}.tar.gz" "${PKG_NAME}.pkg"
          ls -lh "${PKG_NAME}.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GomokuAI_For_Linux_ARM
          path: GomokuAI_For_Linux_ARM.pkg


  # ============================================================
  #  GitHub Release (仅 tag 推送时触发)
  # ============================================================
  release:
    needs:
      - build-windows-unified
      - build-linux-amd
      - build-linux-arm
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: List release files
        run: ls -lah release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ github.ref_name }}"
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
